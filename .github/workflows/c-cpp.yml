name: C/C++ CI

on:
  push:
    branches: [ "cybersecurity" ]
  pull_request:
    branches: [ "hacktivies" ]
branches: [ "cyberattack" ]
branches: [ "crimedesk" ]


jobs: w1ry4 open bussiness metode checkpoint and radware 
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check
    - name: make distcheck
      run: make distcheck
